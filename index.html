<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MeshyAI Photobooth</title>

<!-- Open Graph for link previews -->
<meta property="og:title" content="My MeshyAI Photo">
<meta property="og:description" content="Made with MeshyAI at GDC 2026">
<meta property="og:image" id="og-image" content="">
<meta property="og:type" content="website">

<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  min-height: 100vh;
  background: radial-gradient(ellipse at 50% 20%, #1e3d20 0%, #0e1f10 45%, #080f09 100%);
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  padding-bottom: 32px;
}

/* ── Header ── */
.header {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 8px;
  padding: 14px 16px 6px;
}
.header img.icon { height: 30px; width: auto; }
.header img.logo { height: 22px; width: auto; }

/* ── Photo ── */
.photo-wrap {
  padding: 10px 16px 0;
}
.photo-wrap img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 14px;
  background: #111;
}
.photo-placeholder {
  width: 100%;
  aspect-ratio: 9/16;
  background: #111;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #444;
  font-size: 0.85rem;
}

/* ── Steps ── */
.steps {
  padding: 16px 16px 0;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.step-hold {
  text-align: center;
  font-size: 1.05rem;
  font-weight: 800;
  letter-spacing: 0.5px;
  color: #fff;
}

/* ── Copy box ── */
.caption-box {
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(255,255,255,0.13);
  border-radius: 18px;
  padding: 16px 18px 14px;
  cursor: pointer;
  user-select: none;
  touch-action: manipulation;
  transition: background 0.15s, border-color 0.2s;
}
.caption-box:active { background: rgba(255,255,255,0.12); }
.caption-box.copied { border-color: rgba(138,223,60,0.5); }

.caption-text {
  font-size: 0.95rem;
  line-height: 1.55;
  color: #ccc;
  margin-bottom: 10px;
}
.copy-label {
  display: block;
  text-align: center;
  font-size: 1.05rem;
  font-weight: 800;
  color: #c8f565;
  letter-spacing: 0.4px;
}

/* ── Share CTA ── */
.share-cta {
  text-align: center;
  font-size: 0.95rem;
  line-height: 1.7;
  color: #ddd;
}
.share-cta strong { color: #fff; font-weight: 700; }
.share-cta .tag { font-weight: 800; font-style: italic; color: #c8f565; }
</style>
</head>
<body>

<div class="header">
  <img class="icon" src="assets/Meshy_Icon.png" alt=""
       onerror="this.style.display='none'">
  <img class="logo" src="assets/logo-Meshy.png" alt="Meshy">
</div>

<div class="photo-wrap">
  <div class="photo-placeholder" id="photoPlaceholder">No photo found.</div>
  <img id="photoImg" src="" alt="Your Meshy photo" style="display:none">
</div>

<div class="steps">

  <p class="step-hold">1&#xFE0F;&#x20E3; HOLD PHOTO TO SAVE</p>

  <div class="caption-box" id="captionBox" onclick="copyCaption()">
    <div class="caption-text" id="captionText"></div>
    <span class="copy-label" id="copyLabel">2&#xFE0F;&#x20E3; CLICK TO COPY TEXT</span>
  </div>

  <p class="share-cta">
    3&#xFE0F;&#x20E3; Share on <strong>X / Instagram / LinkedIn</strong><br>
    with <span class="tag">#MeshyGDC @MeshyAI</span><br>
    to win our special gift &#x1F381;
  </p>

</div>

<script>
(function() {
  var params  = new URLSearchParams(window.location.search);
  var photoUrl = params.get('photo')   || '';
  var maskName = params.get('mask')    || 'AI Mask';
  var caption  = params.get('caption') || ('I just unlocked ' + maskName + ' \uD83C\uDF89 with @MeshyAI at GDC 2026! #MeshyGDC2026 #MeshyAI');

  document.getElementById('og-image').setAttribute('content', photoUrl);

  if (photoUrl) {
    var img = document.getElementById('photoImg');
    img.src = photoUrl;
    img.style.display = 'block';
    document.getElementById('photoPlaceholder').style.display = 'none';
  }

  document.getElementById('captionText').textContent = caption;

  window._caption = caption;
})();

function copyCaption() {
  var text  = window._caption;
  var box   = document.getElementById('captionBox');
  var label = document.getElementById('copyLabel');
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text);
    } else {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;opacity:0;';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      document.execCommand('copy');
      ta.remove();
    }
  } catch(e) {}
  box.classList.add('copied');
  label.textContent = '\u2705 Copied!';
  setTimeout(function() {
    box.classList.remove('copied');
    label.textContent = '2\uFE0F\u20E3 CLICK TO COPY TEXT';
  }, 2200);
}
</script>
</body>
</html>
